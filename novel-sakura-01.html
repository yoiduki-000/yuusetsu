<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大きな桜の樹の下で｜第一話</title>

<style>
body{
  margin:0;
  background:#f3eee8;
  color:#2f2a27;
  font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
  line-height:2.2;
}

header{
  text-align:center;
  padding:60px 20px 30px;
  background:#2a2326;
  color:#f7f1ec;
}

header h1{
  margin:0;
  font-weight:normal;
  font-size:38px;
  letter-spacing:0.08em;
}

header p{
  margin-top:10px;
  color:#d6c9c3;
}

nav{
  text-align:center;
  background:#1c1719;
  padding:12px;
}

nav a{
  color:#f5ece8;
  margin:0 12px;
  text-decoration:none;
}

.reading-tools{
  width:min(900px,92%);
  margin:32px auto 0;
  text-align:right;
}

.reading-tools button{
  font-family:inherit;
  font-size:15px;
  padding:8px 18px;
  margin-left:8px;
  color:#3a302d;
  background:#fffaf5;
  border:1px solid #cdbdb3;
  cursor:pointer;
}

.reading-tools button.active{
  color:#fffaf5;
  background:#5f494c;
}

.novel-body{
  width:min(900px,92%);
  margin:24px auto 50px;
  padding:55px 70px;
  background:#fffaf5;
  border:1px solid #d6c9bf;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.chapter{
  text-align:center;
  margin-bottom:50px;
}

.chapter h2{
  font-size:30px;
  font-weight:normal;
  margin:0;
}

.chapter p{
  color:#7b6d67;
}

.novel-body p{
  margin:0 0 1.8em;
  font-size:19px;
}

/* 縦書き */
.novel-body.vertical{
  width:min(1100px,94%);
  height:72vh;
  overflow-x:auto;
  overflow-y:hidden;
  writing-mode:vertical-rl;
  text-orientation:upright;
  line-height:2.1;
  padding:50px 42px;
}

.novel-body.vertical .chapter{
  text-align:left;
  margin-left:54px;
  margin-bottom:0;
}

.novel-body.vertical p{
  margin:0 0 0 1.7em;
}

.page-footer{
  width:min(900px,92%);
  margin:30px auto 70px;
  display:flex;
  justify-content:space-between;
}

.page-footer a{
  color:#6d4f4b;
  text-decoration:none;
}

@media (max-width:700px){
  header h1{
    font-size:28px;
  }

  .novel-body{
    padding:30px 22px;
  }

  .novel-body p{
    font-size:18px;
  }

  .reading-tools{
    text-align:center;
  }

  .page-footer{
    display:block;
    text-align:center;
  }

  .page-footer a{
    display:block;
    margin:12px 0;
  }
}
</style>
</head>

<body>

<header>
  <h1>大きな桜の樹の下で</h1>
  <p>第一話　はじまり</p>
</header>

<nav>
  <a href="main.html">Home</a>
  <a href="novel.html">Novel</a>
</nav>

<div class="reading-tools">
  <button id="horizontalButton" class="active" type="button">横書き</button>
  <button id="verticalButton" type="button">縦書き</button>
</div>

<main id="novelBody" class="novel-body">

  <section class="chapter">
    <h2>第一話</h2>
    <p>はじまり</p>
  </section>

  <p>ここに本文を入れます。</p>

  <p>美しい唄声が響き渡る。</p>

  <p>騎士の腕に抱かれて、少年が唄を紡いでいる。</p>

  <p>明るい空の下。地下に植えられていたすべての樹木が、この場所に移動されていた。</p>

</main>

<footer class="page-footer">
  <a href="novel.html">← 小説一覧へ</a>
  <a href="#">次の話 →</a>
</footer>

<script>
const novelBody = document.getElementById("novelBody");
const horizontalButton = document.getElementById("horizontalButton");
const verticalButton = document.getElementById("verticalButton");

horizontalButton.addEventListener("click", function(){
  novelBody.classList.remove("vertical");
  horizontalButton.classList.add("active");
  verticalButton.classList.remove("active");
});

verticalButton.addEventListener("click", function(){
  novelBody.classList.add("vertical");
  verticalButton.classList.add("active");
  horizontalButton.classList.remove("active");
});
</script>

</body>
</html>
